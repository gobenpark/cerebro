version: "2"

run:
  modules-download-mode: readonly
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - containedctx
    - decorder
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - forcetypeassert
    - gochecknoinits
    - goconst
    - gocritic
    - govet
    - grouper
    - importas
    - ineffassign
    - interfacebloat
    - lll
    - makezero
    - misspell
    - nakedret
    - nilerr
    - noctx
    - nolintlint
    - prealloc
    - staticcheck
    - testifylint
    - unparam
    - unused
  settings:
    dupl:
      threshold: 100
    exhaustive:
      default-signifies-exhaustive: true
    goconst:
      min-len: 2
      min-occurrences: 3
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - hugeParam
        - importShadow # `log log.Logger` / `item *item.Item` params are idiomatic here
        - captLocal # K/D are conventional names for stochastic lines
    interfacebloat:
      # order.Order is a rich domain value interface (getters + state transitions
      # + attribution); 21 methods is intentional.
      max: 22
    lll:
      line-length: 300
    misspell:
      locale: US
    nakedret:
      max-func-lines: 150
    nolintlint:
      require-explanation: false
      require-specific: false
      allow-unused: false
    testifylint:
      disable:
        # We intentionally use assert.Error/ErrorIs for error *verifications* that
        # are followed by independent state checks, so both failures surface.
        - require-error
    staticcheck:
      # stylecheck (ST*) is merged into staticcheck in v2.
      checks:
        - all
        - -ST1000 # package comment of the form "Package x ..." (license header conflicts)
        - -ST1003 # naming conventions
        - -ST1005 # error strings should not be capitalized
        - -ST1016 # receiver name consistency
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - dupl
          - lll
          - nakedret
          - unparam # test helpers intentionally take fixed args for readability

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/gobenpark/cerebro
